<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic TaT Toe — Multiplayer</title>
    <meta name="description"
        content="A beautifully designed real-time multiplayer Tic Tac Toe game powered by Socket.IO.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    <div class="bg-glow bg-glow-3"></div>

    <!-- ========== LOBBY SCREEN ========== -->
    <div class="container lobby-container" id="lobby">
        <header>
            <h1>Tic TaT Toe</h1>
            <p class="subtitle">Aliyaaa valichu!</p>
        </header>

        <div class="lobby-card" id="lobby-card">
            <div class="lobby-buttons">
                <button class="btn btn-primary lobby-btn" id="create-room-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    Create Room
                </button>

                <div class="lobby-divider">
                    <span>or</span>
                </div>

                <div class="join-form" id="join-form">
                    <input type="text" class="room-input" id="room-code-input" placeholder="Room Code" maxlength="4"
                        autocomplete="off" spellcheck="false">
                    <button class="btn btn-secondary lobby-btn" id="join-room-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                            <polyline points="10 17 15 12 10 7"></polyline>
                            <line x1="15" y1="12" x2="3" y2="12"></line>
                        </svg>
                        Join Room
                    </button>
                </div>
            </div>

            <p class="lobby-error" id="lobby-error"></p>
        </div>

        <!-- Waiting state after creating a room -->
        <div class="waiting-card hidden" id="waiting-card">
            <p class="waiting-label">Share this code with your friend and begin the 1v1 setta:</p>
            <div class="room-code-display" id="room-code-display"></div>
            <div class="waiting-dots">
                <span>Waiting for opponent</span>
                <span class="dots-anim"></span>
            </div>
            <button class="btn btn-secondary btn-small" id="cancel-room-btn">Cancel</button>
        </div>
    </div>

    <!-- ========== GAME SCREEN ========== -->
    <div class="container game-container hidden" id="game">
        <header>
            <h1>Tic Tac Toe</h1>
            <div class="game-info-bar">
                <span class="room-badge" id="game-room-code"></span>
                <span class="player-badge" id="player-badge"></span>
            </div>
        </header>

        <div class="scoreboard">
            <div class="score-card score-x">
                <span class="score-label"><img src="nannu.jpg" alt="X" class="score-icon"></span>
                <span class="score-value" id="score-x">0</span>
            </div>
            <div class="score-card score-draw">
                <span class="score-label">Draw</span>
                <span class="score-value" id="score-draw">0</span>
            </div>
            <div class="score-card score-o">
                <span class="score-label"><img src="gumaaro.jpg" alt="O" class="score-icon"></span>
                <span class="score-value" id="score-o">0</span>
            </div>
        </div>

        <div class="turn-indicator" id="turn-indicator">
            <div class="turn-symbol-wrapper">
                <img src="nannu.jpg" alt="X" class="turn-icon" id="turn-icon">
            </div>
            <span id="turn-text">'s Turn</span>
        </div>

        <div class="board-wrapper">
            <div class="board" id="board">
                <div class="cell" data-index="0" id="cell-0"></div>
                <div class="cell" data-index="1" id="cell-1"></div>
                <div class="cell" data-index="2" id="cell-2"></div>
                <div class="cell" data-index="3" id="cell-3"></div>
                <div class="cell" data-index="4" id="cell-4"></div>
                <div class="cell" data-index="5" id="cell-5"></div>
                <div class="cell" data-index="6" id="cell-6"></div>
                <div class="cell" data-index="7" id="cell-7"></div>
                <div class="cell" data-index="8" id="cell-8"></div>
            </div>
            <svg class="win-line-svg" id="win-line-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
                <line id="win-line" x1="0" y1="0" x2="0" y2="0" />
            </svg>
        </div>

        <div class="status" id="status"></div>

        <div class="actions">
            <button class="btn btn-primary hidden" id="rematch-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="23 4 23 10 17 10"></polyline>
                    <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                </svg>
                Rematch
            </button>
            <button class="btn btn-secondary" id="leave-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                Leave Room
            </button>
        </div>
    </div>

    <!-- ========== RESULT MODAL ========== -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal" id="modal">
            <div class="modal-icon" id="modal-icon"></div>
            <h2 class="modal-title" id="modal-title"></h2>
            <p class="modal-message" id="modal-message"></p>
            <button class="btn btn-primary modal-btn" id="modal-btn">Rematch</button>
        </div>
    </div>

    <!-- ========== AUDIO ========== -->
    <audio id="bg-music" loop>
        <source src="starostin-comedy-cartoon-funny-background-music-492540.mp3" type="audio/mpeg">
    </audio>

    <div class="audio-controls">
        <button id="mute-btn" class="btn-icon" title="Toggle Mute">
            <svg id="mute-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
            </svg>
        </button>
        <div class="volume-slider-wrapper">
            <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5">
        </div>
    </div>

    <footer class="footer">
        <p>Made with <span class="heart">❤</span> <a href="https://www.youtube.com/@blazeyftw">Blazey</a></p>
    </footer>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>

</html>
